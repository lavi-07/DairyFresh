<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DairyFresh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>DairyFresh</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="#products">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button id="cartButton" class="btn cart-toggle" type="button" onclick="toggleCart()">
      <span class="cart-icon">🛒</span>
      <span class="cart-text">Cart</span>
      <span class="cart-count">(<span id="cartCount">0</span>)</span>
    </button>
  </header>

  <div id="cartMessage" class="cart-message"></div>

  <section class="hero" id="home">
    <div class="hero-content">
      <h2>Fresh Dairy Products Everyday</h2>
      <p>Pure Milk, Butter, Cheese & More Direct from Farm</p>
      <button class="btn" onclick="scrollToProducts()">Shop Now</button>
    </div>
  </section>

  <section id="products">
    <h2 class="section-title">Our Products</h2>
    
    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search products..." class="search-bar">
    </div>

    <!-- Category Filter -->
    <div class="category-filter">
      <button class="category-btn active" onclick="filterByCategory('All')">All</button>
      <button class="category-btn" onclick="filterByCategory('Milk')">Milk</button>
      <button class="category-btn" onclick="filterByCategory('Milk Products')">Milk Products</button>
      <button class="category-btn" onclick="filterByCategory('Cheese')">Cheese</button>
      <button class="category-btn" onclick="filterByCategory('Yogurt')">Yogurt</button>
    </div>

    <div class="products" id="productsContainer">
      <!-- Products will be dynamically inserted here -->
    </div>
    
    <div id="noResults" style="text-align: center; font-size: 18px; color: #999; margin-top: 40px; display: none;">
      No products found matching your search.
    </div>
  </section>
  <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>
  <aside id="cartDrawer" class="cart-drawer">
    <div class="cart-drawer-header">
      <h3>Your Cart</h3>
      <button class="btn close-cart" type="button" onclick="toggleCart()">Close</button>
    </div>
    <div id="cartItems" class="cart-items">
      <p class="empty-cart">Your cart is empty.</p>
    </div>
    <div class="cart-footer">
      <p>Total: <strong id="cartTotal">₹0</strong></p>
      <button class="btn" type="button" onclick="checkout()">Checkout</button>
    </div>
  </aside>

  <footer>
    <p>© 2026 DairyFresh | Quality Dairy Products for Every Family</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
